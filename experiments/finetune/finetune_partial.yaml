classifier_kwargs:
  xavier_init: false
  norm: false

finetune_mode: full_ft

full_ft:
  # Example: ["blocks\.[0-7]\."] freezes the first 8 transformer blocks.
  freeze_layers:
    - patch_embed
    - pos_embed
    - model\.blocks\.[0-7]\.

batch_size: 32
accum_iter: 4

epochs: 30
delay_epochs: 5

wandb: true
