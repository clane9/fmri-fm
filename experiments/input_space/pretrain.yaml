# intermediate temporal patch size
t_patch_size: 4

masking: tube

model_kwargs:
  # don't position encode tokens from encoder
  # encoded tokens already position encoded
  no_decode_pos: true

  # don't add position to cls and reg tokens
  # redundant
  no_embed_class: true

  # initialize decoder head with zeros
  # avoids hockey stick loss. although perhaps that is good? it does make the grads
  # small. but I think it will be useful in this case due to very different output
  # dimensions for the different spaces
  head_init_scale: 0.0

# let's try the more modern amp dtype
# don't be scared
amp_dtype: bfloat16
