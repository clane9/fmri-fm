# intermediate temporal patch size for fun
t_patch_size: 4

masking: tube

model_kwargs:
  # will override this
  decoding: attn

  # don't position encode tokens from encoder
  # this is more fair across decoding strategies
  no_decode_pos: true

  # only use reg tokens, not cls. shouldn't make a difference for encoder.
  # also excludes cls from decoder, which is more fair across decoding strategies since
  # non-attn decoding don't use it.
  class_token: false
  reg_tokens: 1

  # don't add position to cls and reg tokens
  # shouldn't make a difference. just for fun.
  no_embed_class: true

# Datasets
datasets:
  hcp-train:
    type: flat-wds
    url: pipe:aws s3 cp s3://medarc/fmri-fm/datasets/hcp-flat/hcp-flat_{0000..1799}.tar -
    clipping: random
    clipping_kwargs:
      # sample more clips from each series, to saturate the data loader.
      oversample: 4.0
    shuffle: true
    buffer_size: 1000
    samples_per_epoch: 200000

  hcp-train-subset:
    # clips from shards {0000..0009} of hcp-flat
    type: flat-clips
    root: s3://medarc/fmri-fm/datasets/flat-clips/hcp-train-clips-16t
    shuffle: false

  hcp-val:
    # clips from shards {1800..1809} of hcp-flat
    type: flat-clips
    root: s3://medarc/fmri-fm/datasets/flat-clips/hcp-val-clips-16t
    shuffle: false

  nsd-val:
    # clips from shards {0000..0009} of nsd-flat
    type: flat-clips
    root: s3://medarc/fmri-fm/datasets/flat-clips/nsd-subj01-clips-16t
    shuffle: false

  ukbb-val:
    type: flat-clips
    root: s3://sophont/fmri-fm/datasets/flat-clips/ukbb-val-clips-mini-16t
    shuffle: false

# which datasets to include
train_dataset: hcp-train
eval_datasets:
  - hcp-train-subset
  - hcp-val
  - nsd-val
  - ukbb-val

num_workers: 16
